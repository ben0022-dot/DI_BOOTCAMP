<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Wars Character Finder</title>
    <link rel="stylesheet" href="style.css">
   
   <style> 

body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    /* Starry background */
    background: #000 url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Orbitron', sans-serif;
    color: #FFE81F; /* Classic Star Wars Yellow */
}

.container {
    text-align: center;
    background: rgba(20, 20, 20, 0.85); /* Dark translucent background */
    padding: 2rem;
    border-radius: 15px;
    border: 2px solid #FFE81F;
    box-shadow: 0 0 20px rgba(255, 232, 31, 0.3);
    width: 90%;
    max-width: 500px;
}

button {
    background-color: #FFE81F;
    color: #000;
    border: none;
    padding: 12px 24px;
    font-family: 'Orbitron', sans-serif;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    border-radius: 5px;
    margin-bottom: 20px;
    transition: transform 0.2s, background-color 0.2s;
}

button:hover {
    background-color: #ffd700;
    transform: scale(1.05);
}

#content h1 {
    font-size: 2rem;
    margin-bottom: 1rem;
    text-shadow: 2px 2px 4px #000;
}

#content p {
    font-size: 1.2rem;
    line-height: 1.6;
    margin: 10px 0;
}

span {
    color: #fff; /* White text for values to differentiate from labels */
}

/* Loading & Error States */
#loading, #error {
    font-size: 1.5rem;
    margin-top: 20px;
}

.fa-spinner {
    font-size: 3rem;
    margin-bottom: 10px;
    display: block;
}

.hidden {
    display: none;
}
@media (max-width: 480px) {
    #content h1 {
        font-size: 1.5rem;
    }
    .container {
        padding: 1rem;
    }
}
   </style>
</head>
<body>
    <div class="container">
        <button id="button">Find Someone!</button>
        
        <div id="content">
            <h1 id="name">Click the button to start!</h1>
            <p>Height: <span id="height"></span></p>
            <p>Gender: <span id="gender"></span></p>
            <p>Birth Year: <span id="birth-year"></span></p>
            <p>Home World: <span id="home-world"></span></p>
        </div>

        <div id="loading" class="hidden">
            <i class="fa-solid fa-spinner fa-spin-pulse"></i>
            <p>Oh, we are searching...</p>
        </div>

        <div id="error" class="hidden">
            <p>Oh No! That person isn't available.</p>
        </div>
    </div>
    <script src="script.js">

        // 1. Get DOM elements
const button = document.getElementById('button');
const nameText = document.getElementById('name');
const heightText = document.getElementById('height');
const genderText = document.getElementById('gender');
const birthYearText = document.getElementById('birth-year');
const homeWorldText = document.getElementById('home-world');
const loadingDiv = document.getElementById('loading');
const contentDiv = document.getElementById('content');
const errorDiv = document.getElementById('error');

// 2. Fetch Data Function
async function getCharacter() {
    toggleLoading(true);
    errorDiv.classList.add('hidden');
    
    try {
        const randomId = Math.floor(Math.random() * 83) + 1;
        const response = await fetch(`https://www.swapi.tech/api/people/${randomId}`);
        
        if (!response.ok) throw new Error('Character not found');

        const data = await response.json();
        const char = data.result.properties;

        // Fetch Homeworld Name (it's a separate URL)
        const homeRes = await fetch(char.homeworld);
        const homeData = await homeRes.json();
        const homeName = homeData.result.properties.name;

        displayCharacter(char, homeName);
    } catch (error) {
        showError();
    } finally {
        toggleLoading(false);
    }
}

// 3. Display Data Function
function displayCharacter(char, homeName) {
    nameText.innerText = char.name;
    heightText.innerText = char.height;
    genderText.innerText = char.gender;
    birthYearText.innerText = char.birth_year;
    homeWorldText.innerText = homeName;
    contentDiv.classList.remove('hidden');
}

function toggleLoading(isLoading) {
    if (isLoading) {
        loadingDiv.classList.remove('hidden');
        contentDiv.classList.add('hidden');
    } else {
        loadingDiv.classList.add('hidden');
    }
}

function showError() {
    contentDiv.classList.add('hidden');
    errorDiv.classList.remove('hidden');
}

button.addEventListener('click', getCharacter);
    </script>

</body>
</html>
