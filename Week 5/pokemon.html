<div class="pokedex-wrapper">
  <img src="pokedex-template.png" class="pokedex-bg" alt="Pokedex">

  <div class="screen">
    <img id="pokemon-image" src=": https://pokeapi.co/ " alt="">
    <h2 id="pokemon-name"></h2>
    <div class="stats">
      <p>ID: <span id="pokemon-id"></span></p>
      <p>Type: <span id="pokemon-type"></span></p>
      <p>H: <span id="pokemon-height"></span>m | W: <span id="pokemon-weight"></span>kg</p>
    </div>
  </div>
</div>

<style>
    /* The actual spinning animation */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.loader {
  border: 4px solid #f3f3f3; /* Light grey */
  border-top: 4px solid #ff1c1c; /* Pokedex Red */
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  display: none; /* Hidden by default */
}

.loader.active {
  display: block;
}

  .pokedex-wrapper {
    position: relative;
    width: 400px;
    margin: 20px auto;
  }

  .pokedex-bg {
    width: 100%;
    display: block;
  }

  .screen {
    position: absolute;
    top: 50px;
    left: 50px;
    width: 300px;
    height: 200px;
    background-color: #f0f0f0;
    border-radius: 10px;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
  }

  #pokemon-image {
    width: 120px;
    height: auto;
    margin-bottom: 10px;
  }

  .stats p {
    margin: 5px 0;
    font-size: 14px;
  }
</style>

<script>
  const pokemonId = new URLSearchParams(window.location.search).get('id');

  async function fetchPokemonData(id) {
    try {
      const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      if (!response.ok) {
        throw new Error('Pokemon not found');
      }
      return await response.json();
    } catch (error) {
      console.error(error);
      return null;
    }
  }

  function displayPokemonData(pokemon) {
    if (!pokemon) {
      document.getElementById('pokemon-name').textContent = 'Pokemon not found';
      return;
    }

    document.getElementById('pokemon-image').src = pokemon.sprites.front_default;
    document.getElementById('pokemon-name').textContent = pokemon.name.toUpperCase();
    document.getElementById('pokemon-id').textContent = pokemon.id;
    document.getElementById('pokemon-type').textContent = pokemon.types.map(t => t.type.name).join(', ');
    document.getElementById('pokemon-height').textContent = (pokemon.height / 10).toFixed(1);
    document.getElementById('pokemon-weight').textContent = (pokemon.weight / 10).toFixed(1);
  }

  fetchPokemonData(pokemonId).then(displayPokemonData);
</script>
